<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClinSumm — Clinical Note Summarizer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10;
    --surface: #0d1117;
    --border: #1e2d3d;
    --teal: #00e5cc;
    --teal-dim: rgba(0,229,204,0.08);
    --teal-glow: rgba(0,229,204,0.15);
    --text: #c9d5e0;
    --text-dim: #4a5a6a;
    --white: #f0f4f8;
    --red: #ff4d6d;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  /* Glow orb */
  body::after {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(0,229,204,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 60px 24px 80px;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 56px;
    animation: fadeDown 0.6s ease both;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--teal-dim);
    border: 1px solid rgba(0,229,204,0.2);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 24px;
  }

  .badge::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--teal);
    animation: pulse 2s infinite;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(36px, 5vw, 56px);
    color: var(--white);
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 16px;
  }

  h1 em {
    font-style: italic;
    color: var(--teal);
  }

  .subtitle {
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
    line-height: 1.6;
  }

  /* Main card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    animation: fadeUp 0.7s ease 0.1s both;
  }

  .card-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(255,255,255,0.01);
  }

  .card-label {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .dots {
    display: flex;
    gap: 6px;
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }
  .dot:nth-child(1) { background: #ff5f57; }
  .dot:nth-child(2) { background: #febc2e; }
  .dot:nth-child(3) { background: #28c840; }

  textarea {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    line-height: 1.7;
    padding: 24px;
    resize: none;
    min-height: 220px;
    display: block;
  }

  textarea::placeholder {
    color: var(--text-dim);
  }

  .card-footer {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .char-count {
    font-size: 11px;
    color: var(--text-dim);
  }

  button {
    background: var(--teal);
    color: #000;
    border: none;
    border-radius: 6px;
    padding: 10px 28px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  button:hover {
    background: #00fff5;
    box-shadow: 0 0 20px rgba(0,229,204,0.3);
    transform: translateY(-1px);
  }

  button:active { transform: translateY(0); }

  button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .spinner {
    width: 12px;
    height: 12px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: none;
  }

  button.loading .spinner { display: block; }
  button.loading .btn-text { display: none; }

  /* Output */
  .output {
    margin-top: 24px;
    animation: fadeUp 0.5s ease both;
    display: none;
  }

  .output.visible { display: block; }

  .output-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  .output-label {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--teal);
  }

  .output-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, rgba(0,229,204,0.3), transparent);
  }

  .output-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--teal);
    border-radius: 8px;
    padding: 28px;
  }

  .section {
    margin-bottom: 20px;
  }

  .section:last-child { margin-bottom: 0; }

  .section-title {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 8px;
    opacity: 0.7;
  }

  .section-content {
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
  }

  .raw-summary {
    font-size: 13px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
  }

  /* Error */
  .error {
    background: rgba(255,77,109,0.08);
    border: 1px solid rgba(255,77,109,0.2);
    border-radius: 8px;
    padding: 16px 20px;
    font-size: 12px;
    color: var(--red);
    margin-top: 16px;
    display: none;
  }

  .error.visible { display: block; }

  /* Footer */
  footer {
    text-align: center;
    margin-top: 64px;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    animation: fadeUp 0.7s ease 0.3s both;
  }

  footer span { color: var(--teal); opacity: 0.6; }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="badge">Powered by Gemini 2.0 Flash</div>
    <h1>Clinical Note<br><em>Summarizer</em></h1>
    <p class="subtitle">Paste any clinical note · Get a structured AI summary in seconds</p>
  </header>

  <div class="card">
    <div class="card-header">
      <span class="card-label">Clinical Note Input</span>
      <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    </div>
    <textarea id="noteInput" placeholder="Paste your clinical note here...

Example:
Patient is a 58-year-old male presenting with chest pain radiating to the left arm for 2 hours. BP 160/95, HR 88, O2 sat 97%. ECG shows ST elevation in leads II, III, aVF. Troponin pending. History of hypertension and type 2 diabetes. Currently on metformin and lisinopril..." spellcheck="false"></textarea>
    <div class="card-footer">
      <span class="char-count" id="charCount">0 characters</span>
      <button id="submitBtn" onclick="summarize()">
        <div class="spinner"></div>
        <span class="btn-text">→ Summarize</span>
      </button>
    </div>
  </div>

  <div class="error" id="errorBox"></div>

  <div class="output" id="outputBox">
    <div class="output-header">
      <span class="output-label">AI Summary</span>
      <div class="output-line"></div>
    </div>
    <div class="output-card">
      <div class="raw-summary" id="summaryContent"></div>
    </div>
  </div>

  <footer>
    Built for <span>Google PromptWars</span> · Gemini 2.0 Flash · Cloud Run · by Faleha Qazi
  </footer>
</div>

<script>
  const textarea = document.getElementById('noteInput');
  const charCount = document.getElementById('charCount');

  textarea.addEventListener('input', () => {
    const n = textarea.value.length;
    charCount.textContent = n + ' character' + (n !== 1 ? 's' : '');
  });

  async function summarize() {
    const note = textarea.value.trim();
    if (!note) return;

    const btn = document.getElementById('submitBtn');
    const output = document.getElementById('outputBox');
    const errorBox = document.getElementById('errorBox');
    const summaryContent = document.getElementById('summaryContent');

    btn.disabled = true;
    btn.classList.add('loading');
    output.classList.remove('visible');
    errorBox.classList.remove('visible');

    try {
      const res = await fetch('/summarize', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ note })
      });

      if (!res.ok) throw new Error('Server error: ' + res.status);
      const data = await res.json();
      summaryContent.textContent = data.summary;
      output.classList.add('visible');
    } catch (err) {
      errorBox.textContent = 'Error: ' + err.message + '. Please try again.';
      errorBox.classList.add('visible');
    } finally {
      btn.disabled = false;
      btn.classList.remove('loading');
    }
  }

  // Enter key support
  textarea.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.key === 'Enter') summarize();
  });
</script>
</body>
</html>
